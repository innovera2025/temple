services:
  db:
    image: postgres:16-alpine
    container_name: wat-dev-db
    environment:
      POSTGRES_DB: wat_dev
      POSTGRES_USER: wat_dev
      POSTGRES_PASSWORD: wat_dev_password
    ports:
      - "5432:5432"
    volumes:
      - wat_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wat_dev -d wat_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wat-dev-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wat_dev_postgres_data:
