# nginx config for the @wat/web SPA (see apps/web/Dockerfile).
# Serves the static build and reverse-proxies /api/* to the API service so the
# browser talks to the API SAME-ORIGIN — no CORS, and the API is never exposed
# to the browser directly.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hardening headers.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # CSP: scripts only from this origin (no inline script — Vite emits external
  # bundles); styles allow inline (React style props); images allow data:/blob:
  # for previews of uploaded evidence files.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # TLS: terminate HTTPS in front of this container (host nginx/caddy/traefik or
  # a cloud LB) — see infra/docker/DEPLOY-TLS.md. Once TLS is in place, enable
  # HSTS at the terminator (or here if this container itself serves 443).

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Container healthcheck target (not the API's /health).
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    add_header X-Content-Type-Options "nosniff" always;
    return 200 "ok\n";
  }

  # API reverse proxy. Using a VARIABLE upstream + Docker's embedded DNS resolver
  # (127.0.0.11) defers name resolution to request time, so nginx still boots when
  # the `api` service isn't up yet (requests 502 until it is) instead of failing at
  # startup. `rewrite` strips the /api prefix: /api/health -> http://api:3000/health.
  location /api/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $wat_api_target http://api:3000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $wat_api_target;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # The API accepts base64 attachment uploads up to ~12 MB (main.ts).
    client_max_body_size 13m;
    proxy_read_timeout 60s;
  }

  # Long-cache the content-hashed Vite assets. Keep nosniff so the immutable JS/CSS
  # bundles can't be MIME-confused (an add_header here drops the server-level ones).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # index.html must NEVER be cached: it references content-hashed asset bundles
  # that change every deploy, so a stale copy would request old (now-404) assets
  # and the app would fail to load (and the login form along with it). The
  # SPA fallback below internally redirects to /index.html, landing here.
  # NOTE: an add_header in a location drops the server-level ones, so the
  # hardening headers are re-declared here to keep them on the HTML document.
  location = /index.html {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Cache-Control "no-cache" always;
  }

  # SPA fallback — every other path returns index.html (client-side router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
